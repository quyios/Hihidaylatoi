name: Build and Patch ADManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up iOS SDK
      run: |
        # Use Xcode's built-in iOS SDK (always available on macos-latest runner)
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK=$SDK" >> $GITHUB_ENV
        echo "Using SDK: $SDK"

    - name: Build Dylib
      run: |
        xcrun clang \
          -arch arm64 \
          -isysroot $SDK \
          -mios-version-min=14.0 \
          -dynamiclib \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -install_name @executable_path/ADManagerRotation.dylib \
          -o ADManagerRotation.dylib \
          Tweak.m
        echo "Build complete. Dylib size: $(wc -c < ADManagerRotation.dylib) bytes"

    - name: Patch IPA
      run: |
        if [ -f "ADManager.ipa" ]; then
          chmod +x patch.sh
          ./patch.sh ADManager.ipa
        else
          echo "ADManager.ipa not found! Please upload it to the repo root."
        fi

    - name: Upload Patched IPA
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ADManager_Patched
        path: ADManager_Patched.ipa

