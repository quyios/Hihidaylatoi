name: Build ADManagerRotation.dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang \
          -arch arm64 \
          -isysroot $SDK \
          -mios-version-min=14.0 \
          -dynamiclib \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -install_name @executable_path/ADManagerRotation.dylib \
          -o ADManagerRotation.dylib \
          Tweak.m
        echo "Done. Size: $(wc -c < ADManagerRotation.dylib) bytes"

    - name: Upload Dylib
      uses: actions/upload-artifact@v4
      with:
        name: ADManagerRotation
        path: ADManagerRotation.dylib

