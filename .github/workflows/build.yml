name: Build and Patch ADManager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Theos
      run: |
        brew install ldid
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Set up iOS SDK
      run: |
        git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

    - name: Build Tweak
      run: |
        make -j$(sysctl -n hw.ncpu)
        # library.mk outputs to .theos/obj/debug/ with .dylib extension
        DYLIB=$(find .theos/obj -name "ADManagerRotation.dylib" | head -1)
        echo "Found dylib at: $DYLIB"
        cp "$DYLIB" ./ADManagerRotation.dylib

    - name: Patch IPA
      run: |
        if [ -f "ADManager.ipa" ]; then
          chmod +x patch.sh
          ./patch.sh ADManager.ipa
        else
          echo "ADManager.ipa not found! Skipping patch step."
          echo "Please upload your IPA as 'ADManager.ipa' to the repository root."
        fi

    - name: Upload Patched IPA
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ADManager_Patched
        path: ADManager_Patched.ipa

